<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=300, initial-scale=1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; color: #1a1a1a; }
    h1 { font-size: 16px; margin-bottom: 12px; }
    .status { font-size: 13px; color: #666; margin-bottom: 12px; min-height: 20px; }
    .status.error { color: #d32f2f; }
    .status.success { color: #2e7d32; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    button {
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    button:hover { background: #f5f5f5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    button.primary:hover { background: #1558b0; }
  </style>
  <script type="module" crossorigin src="./popup.js"></script>
</head>
<body>
  <h1>Clipper</h1>
  <div id="status" class="status">Подготовка...</div>
  <div class="actions" id="actions">
    <button id="btn-download" class="primary" disabled>Скачать .md</button>
    <button id="btn-copy" disabled>Копировать в буфер</button>
  </div>
</body>
</html>
